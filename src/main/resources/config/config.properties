######################################
# Mobile Automation Framework Config
######################################

# Platform: ANDROID | IOS
platform=ANDROID

# Execution Mode: LOCAL | BROWSERSTACK | SAUCELABS
execution.mode=LOCAL

# Environment: DEV | QA | STAGE | PROD
environment=QA

# Appium Server
appium.server.url=http://127.0.0.1:4723

# Timeouts (seconds)
explicit.wait=30
implicit.wait=10
page.load.timeout=60
polling.interval=500

# Android Capabilities (Sauce Labs My Demo App)
android.app.path=src/test/resources/apps/SauceLabs-MyDemoApp.apk
android.device.name=emulator-5554
android.platform.version=14
android.automation.name=UiAutomator2
android.app.package=com.saucelabs.mydemoapp.android
android.app.activity=com.saucelabs.mydemoapp.android.view.activities.SplashActivity

# iOS Capabilities
ios.app.path=src/test/resources/apps/ios-app.app
ios.device.name=iPhone 14
ios.platform.version=16.4
ios.automation.name=XCUITest
ios.bundle.id=com.example.app

# BrowserStack
browserstack.url=https://hub-cloud.browserstack.com/wd/hub
browserstack.app.url=bs://app-id
browserstack.build.name=Mobile-Automation-Build
browserstack.project.name=Enterprise-Mobile-Framework

# Reporting
report.path=test-output/reports
screenshot.path=test-output/screenshots
video.recording=true

# Retry
retry.count=0
retry.on.failure=true

# Logging
log.level=INFO
log.file.path=logs/framework.log

# API Base URL
api.base.url=https://api.example.com

# MongoDB
mongodb.connection.string=mongodb://localhost:27017
mongodb.database=test_automation

# Parallel Execution
parallel.enabled=false
parallel.thread.count=3
