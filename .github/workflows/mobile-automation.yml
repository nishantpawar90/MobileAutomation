name: Mobile Automation CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target Platform'
        required: true
        type: choice
        options:
          - ANDROID
          - IOS
        default: ANDROID
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - QA
          - DEV
          - STAGE
        default: QA
      test_suite:
        description: 'Test Suite'
        required: true
        type: choice
        options:
          - smoke
          - regression
          - sanity
        default: smoke
      execution_mode:
        description: 'Execution Mode'
        required: true
        type: choice
        options:
          - BROWSERSTACK
          - LOCAL
        default: LOCAL

env:
  JAVA_VERSION: '17'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Build & Compile Validation (always runs - no device needed)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile Project
        run: mvn compile test-compile -B -q

      - name: Verify Dependencies
        run: mvn dependency:resolve -B -q

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Android Tests on Emulator (runs on push/PR - no BrowserStack needed)
  # ─────────────────────────────────────────────────────────────────────────────
  android-test:
    name: Android Emulator Tests
    needs: build
    runs-on: macos-13
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.execution_mode == 'LOCAL' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2
          echo "✅ Appium installed: $(appium --version)"

      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-macos-${{ runner.os }}

      - name: Run Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          profile: Pixel 6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "============================================"
            echo "🚀 RUNNING SMOKE TESTS ON ANDROID EMULATOR"
            echo "============================================"

            # Start Appium server in background
            appium --address 127.0.0.1 --port 4723 --relaxed-security &
            sleep 10

            adb devices
            echo ""

            mvn test \
              -Dsuite.xml=testng-smoke.xml \
              -Dfw.platform=ANDROID \
              -Dfw.environment=QA \
              -Dfw.execution.mode=LOCAL \
              -Dfw.android.device.name=emulator-5554 \
              -Dfw.android.platform.version=12 \
              -Dsurefire.useFile=false \
              -B 2>&1 | tee test-output.log

            echo ""
            echo "============================================"
            echo "📊 TEST EXECUTION COMPLETE"
            echo "============================================"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Android Test Results
          path: target/surefire-reports/testng-results.xml
          reporter: java-junit

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.7
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-android-emulator
          path: |
            test-output/
            target/allure-results/
            target/surefire-reports/
            logs/
            test-output.log
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: BrowserStack Cloud Tests (only when secrets are available)
  # ─────────────────────────────────────────────────────────────────────────────
  browserstack-test:
    name: BrowserStack Cloud Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.execution_mode == 'BROWSERSTACK' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ANDROID
            device: "Google Pixel 6"
            os_version: "13.0"
          - platform: IOS
            device: "iPhone 14"
            os_version: "16"

    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate BrowserStack Credentials
        run: |
          if [ -z "$BROWSERSTACK_USERNAME" ] || [ -z "$BROWSERSTACK_ACCESS_KEY" ]; then
            echo "❌ ERROR: BrowserStack credentials not configured!"
            echo "Please add BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY as repository secrets."
            echo "Go to: Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
          echo "✅ BrowserStack credentials found"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Upload App to BrowserStack
        id: upload-app
        run: |
          echo "📱 Uploading app to BrowserStack..."
          RESPONSE=$(curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@src/test/resources/apps/SauceLabs-MyDemoApp.apk" \
            -F "custom_id=MobileAutomationApp")
          
          echo "Response: $RESPONSE"
          APP_URL=$(echo $RESPONSE | jq -r '.app_url')
          
          if [ "$APP_URL" == "null" ] || [ -z "$APP_URL" ]; then
            echo "❌ Failed to upload app to BrowserStack"
            exit 1
          fi
          
          echo "✅ App uploaded: $APP_URL"
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

      - name: Run Tests on BrowserStack
        run: |
          SUITE_FILE="testng-${{ github.event.inputs.test_suite || 'smoke' }}.xml"
          PLATFORM="${{ github.event.inputs.platform || matrix.platform }}"
          ENV="${{ github.event.inputs.environment || 'QA' }}"

          echo "============================================"
          echo "🚀 RUNNING TESTS ON BROWSERSTACK"
          echo "   Platform: $PLATFORM"
          echo "   Device:   ${{ matrix.device }}"
          echo "   OS:       ${{ matrix.os_version }}"
          echo "   Suite:    $SUITE_FILE"
          echo "============================================"

          mvn test \
            -Dsuite.xml=$SUITE_FILE \
            -Dfw.platform=$PLATFORM \
            -Dfw.environment=$ENV \
            -Dfw.execution.mode=BROWSERSTACK \
            -Dfw.browserstack.app.url=${{ steps.upload-app.outputs.app_url }} \
            -Dfw.browserstack.device="${{ matrix.device }}" \
            -Dfw.browserstack.os.version="${{ matrix.os_version }}" \
            -Dsurefire.useFile=false \
            -Dthread.count=3 \
            -B 2>&1 | tee test-output.log

          echo ""
          echo "============================================"
          echo "📊 TEST EXECUTION COMPLETE"
          echo "============================================"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: BrowserStack Results - ${{ matrix.platform }}
          path: target/surefire-reports/testng-results.xml
          reporter: java-junit

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-browserstack-${{ matrix.platform }}
          path: |
            test-output/
            target/allure-results/
            target/surefire-reports/
            logs/
            test-output.log
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Notification Summary
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notification
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack Notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.build.result }}
          fields: repo,message,commit,author,workflow,ref
          custom_payload: |
            {
              "attachments": [{
                "color": "${{ needs.build.result == 'success' && '#36a64f' || '#ff0000' }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ needs.build.result == 'success' && '✅' || '❌' }} Mobile Automation - ${{ needs.build.result }}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {"type": "mrkdwn", "text": "*Platform:* Android"},
                      {"type": "mrkdwn", "text": "*Suite:* smoke"},
                      {"type": "mrkdwn", "text": "*Branch:* ${{ github.ref_name }}"},
                      {"type": "mrkdwn", "text": "*Trigger:* ${{ github.event_name }}"}
                    ]
                  }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
